<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="200" viewBox="0 0 1200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1120;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#101d33;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="200" rx="12" fill="url(#bg)" />

  <!-- Subtle decorative hexagons (echoing AISquare logo) -->
  <g fill="none" stroke="#ffffff" opacity="0.04" stroke-width="1">
    <polygon points="120,30 145,15 170,30 170,60 145,75 120,60" />
    <polygon points="80,90 105,75 130,90 130,120 105,135 80,120" />
    <polygon points="160,100 185,85 210,100 210,130 185,145 160,130" />
    <polygon points="1000,25 1025,10 1050,25 1050,55 1025,70 1000,55" />
    <polygon points="1040,75 1065,60 1090,75 1090,105 1065,120 1040,105" />
    <polygon points="970,85 995,70 1020,85 1020,115 995,130 970,115" />
    <polygon points="1080,120 1105,105 1130,120 1130,150 1105,165 1080,150" />
  </g>

  <!-- AISquare logo mark — three interlocking blades forming a hexagon -->
  <g transform="translate(579, 16)" fill="none" stroke="#ffffff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.92">
    <!-- The logo is a hexagonal shape composed of three parallelogram blades
         arranged in a pinwheel/turbine pattern, creating a triangular hole in the center.
         Each blade connects two outer hex vertices through a curved/angled path. -->
    <g transform="translate(0,0)">
      <!-- Outer hexagon guide (invisible) — vertices at:
           Top: 21,0  TopRight: 42,12  BotRight: 42,36  Bot: 21,48  BotLeft: 0,36  TopLeft: 0,12 -->

      <!-- Top-right blade: from top vertex, sweeps right and down -->
      <path d="M 21,1 L 40,12 L 40,33 L 27,18 Z" fill="#ffffff" stroke="none" opacity="0.9" />

      <!-- Bottom blade: from bottom-right, sweeps left and down -->
      <path d="M 40,33 L 21,47 L 2,36 L 21,24 Z" fill="#ffffff" stroke="none" opacity="0.9" />

      <!-- Top-left blade: from top-left, sweeps up -->
      <path d="M 2,36 L 2,15 L 21,1 L 15,24 Z" fill="#ffffff" stroke="none" opacity="0.9" />

      <!-- Center triangular gap — cut out for contrast -->
      <polygon points="27,18 21,24 15,24" fill="#0b1120" stroke="none" />
    </g>
  </g>

  <!-- Title -->
  <text x="600" y="115" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="30" font-weight="bold" letter-spacing="0.5">Explore Our Open Source Ecosystem Map</text>

  <!-- Subtitle -->
  <text x="600" y="148" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="15" letter-spacing="0.3">awesome-aisquare · Quickstarts, guides, integrations &amp; community resources →</text>

  <!-- Thin bottom accent line matching navy -->
  <rect x="400" y="170" width="400" height="1.5" rx="1" fill="#ffffff" opacity="0.1" />
</svg>
