<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#161b22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0883e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" />

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)" />

  <!-- Decorative grid dots -->
  <g fill="#21262d" opacity="0.5">
    <circle cx="50" cy="50" r="1.5" /><circle cx="100" cy="50" r="1.5" /><circle cx="150" cy="50" r="1.5" /><circle cx="200" cy="50" r="1.5" /><circle cx="250" cy="50" r="1.5" /><circle cx="300" cy="50" r="1.5" />
    <circle cx="50" cy="100" r="1.5" /><circle cx="100" cy="100" r="1.5" /><circle cx="150" cy="100" r="1.5" /><circle cx="200" cy="100" r="1.5" /><circle cx="250" cy="100" r="1.5" /><circle cx="300" cy="100" r="1.5" />
    <circle cx="50" cy="150" r="1.5" /><circle cx="100" cy="150" r="1.5" /><circle cx="150" cy="150" r="1.5" /><circle cx="200" cy="150" r="1.5" /><circle cx="250" cy="150" r="1.5" /><circle cx="300" cy="150" r="1.5" />
    <circle cx="50" cy="200" r="1.5" /><circle cx="100" cy="200" r="1.5" /><circle cx="150" cy="200" r="1.5" /><circle cx="200" cy="200" r="1.5" /><circle cx="250" cy="200" r="1.5" /><circle cx="300" cy="200" r="1.5" />
    <circle cx="900" cy="100" r="1.5" /><circle cx="950" cy="100" r="1.5" /><circle cx="1000" cy="100" r="1.5" /><circle cx="1050" cy="100" r="1.5" /><circle cx="1100" cy="100" r="1.5" /><circle cx="1150" cy="100" r="1.5" />
    <circle cx="900" cy="150" r="1.5" /><circle cx="950" cy="150" r="1.5" /><circle cx="1000" cy="150" r="1.5" /><circle cx="1050" cy="150" r="1.5" /><circle cx="1100" cy="150" r="1.5" /><circle cx="1150" cy="150" r="1.5" />
    <circle cx="900" cy="200" r="1.5" /><circle cx="950" cy="200" r="1.5" /><circle cx="1000" cy="200" r="1.5" /><circle cx="1050" cy="200" r="1.5" /><circle cx="1100" cy="200" r="1.5" /><circle cx="1150" cy="200" r="1.5" />
    <circle cx="900" cy="250" r="1.5" /><circle cx="950" cy="250" r="1.5" /><circle cx="1000" cy="250" r="1.5" /><circle cx="1050" cy="250" r="1.5" /><circle cx="1100" cy="250" r="1.5" /><circle cx="1150" cy="250" r="1.5" />
  </g>

  <!-- Decorative shapes -->
  <rect x="80" y="80" width="60" height="60" rx="8" fill="none" stroke="#58a6ff" stroke-width="1" opacity="0.15" transform="rotate(15, 110, 110)" />
  <rect x="160" y="180" width="40" height="40" rx="6" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.12" transform="rotate(-10, 180, 200)" />
  <circle cx="1050" cy="80" r="35" fill="none" stroke="#f0883e" stroke-width="1" opacity="0.12" />
  <circle cx="1100" cy="220" r="25" fill="none" stroke="#58a6ff" stroke-width="1" opacity="0.1" />
  <rect x="950" y="180" width="50" height="50" rx="8" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.1" transform="rotate(20, 975, 205)" />

  <!-- AI Square icon placeholder -->
  <g transform="translate(480, 70)">
    <rect x="0" y="0" width="56" height="56" rx="12" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6" />
    <rect x="8" y="8" width="16" height="16" rx="3" fill="#58a6ff" opacity="0.8" />
    <rect x="32" y="8" width="16" height="16" rx="3" fill="#7c3aed" opacity="0.8" />
    <rect x="8" y="32" width="16" height="16" rx="3" fill="#f0883e" opacity="0.8" />
    <rect x="32" y="32" width="16" height="16" rx="3" fill="#58a6ff" opacity="0.8" />
  </g>

  <!-- Organization name -->
  <text x="600" y="175" text-anchor="middle" fill="#e6edf3" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="42" font-weight="bold" letter-spacing="1">AISquare Studio</text>

  <!-- Tagline -->
  <text x="600" y="215" text-anchor="middle" fill="#8b949e" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="18" letter-spacing="0.5">Governance, audit, and trust infrastructure for agentic AI</text>

  <!-- Accent line bottom -->
  <rect x="0" y="297" width="1200" height="3" fill="url(#accent)" />
</svg>
